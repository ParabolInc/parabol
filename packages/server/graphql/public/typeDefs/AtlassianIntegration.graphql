"""
The Atlassian (Jira Cloud) OAuth integration for a specific user on a specific Parabol team.
Stores the OAuth tokens and account linkage needed to read and write Jira issues on behalf of
the user. One record exists per (team, user) pair. Use this type to determine whether a team
member has connected Jira, to retrieve their accessible Jira projects, and to fetch or search
Jira issues for display in Parabol meetings (e.g. Sprint Poker estimation).
"""
type AtlassianIntegration {
  """
  Composite primary key in the format "atlassian:teamId:userId". Use this to uniquely
  identify a single user's Atlassian integration within a specific Parabol team.
  """
  id: ID!

  """
  Whether the stored OAuth tokens are still valid and the integration is usable. Becomes
  false when the user revokes access in Atlassian, the refresh token expires, or the
  integration is explicitly disconnected. Check this before attempting any Jira operations.
  """
  isActive: Boolean!

  """
  A short-lived Atlassian OAuth 2.0 access token (valid for ~1 hour) that can be used to
  call the Atlassian REST API directly. Only returned when the requesting viewer is the
  owner of this integration; null otherwise or when no token is available. Do not cache
  this value — treat it as ephemeral.
  """
  accessToken: ID

  """
  The Atlassian account ID (e.g. "5b10a2844c20165700ede21g") of the user who authorized
  the integration. This is the Atlassian-side identifier and can be used in Jira API calls
  to reference the user.
  """
  accountId: ID!

  """
  The list of Atlassian cloud site IDs (e.g. "your-domain.atlassian.net" instance IDs) that
  the user has granted Parabol access to. A user may have multiple Atlassian organizations;
  this list scopes which ones are available. Required when constructing Atlassian API URLs,
  which are of the form https://api.atlassian.com/ex/jira/{cloudId}/...
  """
  cloudIds: [ID!]!

  """
  Timestamp when this integration record was first created, i.e. when the user first
  connected their Atlassian account to this Parabol team.
  """
  createdAt: DateTime!

  """
  The Parabol team ID that this integration belongs to. The integration is scoped to a
  single team — the same Atlassian account connected to two different teams creates two
  separate AtlassianIntegration records.
  """
  teamId: ID!

  """
  Timestamp when the OAuth tokens were last refreshed or the integration record was last
  modified. Useful for determining how recently the integration was active.
  """
  updatedAt: DateTime!

  """
  The Parabol user ID of the person who owns this integration. Together with teamId, this
  uniquely identifies the integration. Only that user can see sensitive fields like
  accessToken.
  """
  userId: ID!

  """
  All Jira projects accessible to this user across all connected Atlassian cloud sites.
  Fetched in real time from the Atlassian API. Returns an empty list if the viewer is not
  the owner of this integration, or if the user has no accessible projects. Use this to
  populate project pickers when the user is adding a Jira issue to a Parabol meeting.
  """
  projects: [JiraRemoteProject!]!

  """
  The user's recent Jira search queries, ordered from most recently used to oldest.
  Only includes queries used within the last 60 days. Use this to populate a
  "recent searches" dropdown so the user can quickly repeat previous searches.
  """
  jiraSearchQueries: [JiraSearchQuery!]!

  """
  A paginated list of Jira issues fetched live from the Jira API for this team member.
  Returns an empty connection if the viewer is not the owner of this integration.
  Use this to let users search for and select Jira issues to bring into a Parabol meeting.
  """
  issues(
    """
    Maximum number of issues to return per page. Defaults to 100.
    """
    first: Int = 100

    """
    Pagination cursor — the value of endCursor from a previous page's pageInfo. Omit to
    start from the beginning.
    """
    after: String

    """
    A plain-text search string (matched against issue summary and description) or a full
    JQL query string when isJQL is true. Omit or pass an empty string to return all issues
    the user can access.
    """
    queryString: String

    """
    Set to true when queryString contains a JQL expression (Jira Query Language), which
    allows advanced filtering by project, assignee, status, sprint, etc. Set to false for
    simple keyword search.
    """
    isJQL: Boolean!

    """
    Optional list of Jira project keys (e.g. ["ENG", "INFRA"]) to restrict results to
    specific projects. When omitted, issues from all accessible projects are returned.
    """
    projectKeyFilters: [ID!]
  ): JiraIssueConnection!
}
