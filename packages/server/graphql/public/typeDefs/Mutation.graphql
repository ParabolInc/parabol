    """
    fieldName: ID!

    """
    The Jira Data Center issue type for which to set the dimension
    """
    issueType: ID!

    """
    Project id for this setting
    """
    projectId: ID!

    """
    The meeting the update happend in. Returns a meeting object with updated serviceField
    """
    meetingId: ID!
  ): UpdateDimensionFieldPayload! @scope(name: MEETINGS_WRITE)

  """
  Describe the mutation here
  """
  updateMeetingPrompt(
    """
    The meeting to update the prompt
    """
    meetingId: ID!

    """
    The updated prompt
    """
    newPrompt: String!
  ): UpdateMeetingPromptPayload! @scope(name: MEETINGS_WRITE)

  """
  Update a meeting template
  """
  updateMeetingTemplate(
    """
    The id of the meeting
    """
    meetingId: ID!

    """
    The id of the meeting template
    """
    templateId: ID!
  ): UpdateMeetingTemplatePayload! @scope(name: MEETINGS_WRITE)

  """
  Update an with a change in name, avatar
  """
  updateOrg(
    """
    the updated org including the id, and at least one other field
    """
    updatedOrg: UpdateOrgInput!
  ): UpdateOrgPayload! @scope(name: ORGS_WRITE)

  """
  Updates the recurrence settings for a meeting
  1. When the meeting is not recurring, this will start the meeting recurring with the given recurrenceRule
  2. When the meeting is recurring and the provided recurrenceRule is defined, this will update the recurrence rule with the given recurrenceRule
  3. When the meeting is recurring and the provided recurrenceRule is null, this will stop the meeting from recurring
  """
  updateRecurrenceSettings(
    """
    ID of the meeting to update recurrence settings for
    """
    meetingId: ID!

    """
    New meeting series name
    """
    name: String

    """
    The recurrence rule for the meeting series in RRULE format
    """
    rrule: RRule
  ): UpdateRecurrenceSettingsPayload! @scope(name: MEETINGS_WRITE)

  """
  Updates the mainCategory for the given template
  """
  updateTemplateCategory(
    """
    The ID of the template
    """
    templateId: ID!

    """
    The new category for the template
    """
    mainCategory: String!
  ): UpdateTemplateCategoryPayload! @scope(name: TEMPLATES_WRITE)
  updateUserProfile(
    """
    The input object containing the user profile fields that can be changed
    """
    updatedUser: UpdateUserProfileInput!
  ): UpdateUserProfilePayload @scope(name: USERS_WRITE)

  """
  Upload the IdP Metadata file for an org for those who cannot self-host the file
  """
  uploadIdPMetadata(
    """
    the XML Metadata file for the IdP
    """
    file: File!

    """
    The orgId to upload the IdP Metadata for
    """
    orgId: ID!
  ): UploadIdPMetadataPayload! @scope(name: ORGS_WRITE)

  """
  Upload an image for an org avatar
  """
  uploadOrgImage(
    """
    the org avatar image file
    """
    file: File!

    """
    The org id to upload an avatar for
    """
    orgId: ID!
  ): UpdateOrgPayload! @scope(name: ORGS_WRITE)

  """
  Take any asset & host it in the file store
  """
  embedUserAsset(
    """
    the asset URL
    """
    url: URL!
    """
    the scope of who can access the file, either user or page
    """
    scope: AssetScopeEnum!
    """
    The client ID of the scope, e.g. userId, teamId, orgId, pageKey
    """
    scopeKey: ID!
  ): UploadUserAssetPayload @scope(name: USERS_WRITE)

  """
  Upload any asset owned by a user
  """
  uploadUserAsset(
    """
    the asset file
    """
    file: File!
    """
    the scope of who can access the file, either user or page
    """
    scope: AssetScopeEnum!
    """
    The client ID of the scope, e.g. userId, teamId, orgId, pageKey
    """
    scopeKey: ID!
  ): UploadUserAssetPayload @scope(name: USERS_WRITE)

  """
  Upload an image for a user avatar
  """
  uploadUserImage(
    """
    the user avatar image file
    """
    file: File!
  ): UpdateUserProfilePayload @scope(name: USERS_WRITE)

  """
  upsert the content of a team prompt response
  """
  upsertTeamPromptResponse(
    """
    The id of the team prompt response to upsert
    """
    teamPromptResponseId: ID

    """
    The id of the team prompt meeting
    """
    meetingId: ID!

    """
    The stringified content of the team prompt response
    """
    content: String!
  ): UpsertTeamPromptResponsePayload! @scope(name: MEETINGS_WRITE)

  """
  Verify an email address and sign in if not already a user
  """
  verifyEmail(
    """
    The 48-byte url-safe base64 encoded verification token
    """
    verificationToken: ID!
  ): UserLogInPayload! @scope(name: USERS_WRITE)

  """
  Update the role-based access for a page
  """
  updatePageAccess(
    """
    The page to update access for
    """
    pageId: ID!
    subjectType: PageSubjectEnum!
    subjectId: ID!
    role: PageRoleEnum
    """
    True if this mutation can unlink the pageId from its parent
    """
    unlinkApproved: Boolean
  ): UpdatePageAccessPayload @scope(name: PAGES_WRITE)

  """
  Requests access to a page
  """
  requestPageAccess(
    """
    The id of the page to request access to
    """
    pageId: ID!

    """
    Reason for requesting access
    """
    reason: String!

    """
    The requested access role
    """
    role: PageRoleEnum!
  ): Boolean @scope(name: PAGES_WRITE)

  """
  Update the page sortOrder, teamId, or parentPageId and adjust access accordingly
  """
  updatePage(
    """
    The ID of the page to update
    """
    pageId: ID!
    """
    The new sort order, as a fractional index
    """
    sortOrder: String!
    """
    The section the page is being moved from
    """
    sourceSection: PageSectionEnum
    """
    The section the page is being moved to
    """
    targetSection: PageSectionEnum
    """
    The new teamId, if moved to a team
    """
    teamId: ID
    """
    true to revoke access for all but the mutator
    """
    makePrivate: Boolean
  ): UpdatePagePayload! @scope(name: PAGES_WRITE)
  """
  link or unlink a page to its parent
  """
  updatePageParentLink(
    """
