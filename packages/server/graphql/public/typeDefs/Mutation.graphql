    """
    isParentLinked: Boolean!
  ): UpdatePagePayload @scope(name: PAGES_WRITE)
  updateTeamSortOrder(
    teamId: ID!
    """
    The new sort order as a fractional index
    """
    sortOrder: String!
  ): UpdateTeamSortOrderPayload @scope(name: TEAMS_WRITE)
  """
  Move a page to the trash
  """
  archivePage(
    pageId: ID!
    """
    The action to take on the page
    """
    action: ArchivePageActionEnum!
  ): ArchivePagePayload @scope(name: PAGES_WRITE)
