"""
Result of disconnecting a user's Atlassian (Jira) integration for a team
"""
type RemoveAtlassianAuthPayload {
  error: StandardMutationError
  """
  The team the integration was removed from
  """
  teamId: ID

  """
  The team member with the updated auth
  """
  teamMember: TeamMember

  """
  The user with updated atlassianAuth
  """
  user: User
}
