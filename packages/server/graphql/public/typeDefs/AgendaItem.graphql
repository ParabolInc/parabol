"""
A topic a team member wants to discuss during the agenda phase of a Check-In meeting (meetingType: "action"). Agenda items are added before or during a meeting, worked through one-by-one in the AgendaItemsPhase, and cleared when the meeting ends. Items marked as pinned are automatically re-created for the next meeting so recurring topics always appear on the agenda.
"""
type AgendaItem {
  """
  The unique agenda item id, formatted as teamId::shortid
  """
  id: ID!

  """
  The text description of the topic to discuss. Maximum 64 characters.
  """
  content: String!

  """
  The timestamp the agenda item was created
  """
  createdAt: DateTime

  """
  True if the agenda item is currently visible and actionable. Set to false when the item is removed or when the meeting ends and non-pinned items are cleared.
  """
  isActive: Boolean!

  """
  The id of the Check-In meeting this agenda item belongs to. Null when the item was added outside of a meeting or carried forward from a previous meeting via pinning.
  """
  meetingId: ID

  """
  True if this agenda item should automatically be re-added to the next meeting when the current meeting ends. Pinned items are cloned at meeting close so they persist across meetings.
  """
  pinned: Boolean

  """
  The id of the original agenda item that was first pinned, tracing the clone lineage across meetings. Null on the original pinned item itself; set on every subsequent clone so the full history of a recurring topic can be retrieved.
  """
  pinnedParentId: ID

  """
  The fractional-index sort order used to position this item in the agenda list
  """
  sortOrder: String!

  """
  The id of the team this agenda item belongs to
  """
  teamId: ID!

  """
  The team member who created this agenda item
  """
  teamMember: TeamMember!

  """
  The id of the team member who created this agenda item
  """
  teamMemberId: ID!

  """
  The timestamp the agenda item was last updated
  """
  updatedAt: DateTime
}
