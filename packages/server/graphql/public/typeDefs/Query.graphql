"""
Root query type for all read operations
"""
type Query {
  """
  The currently authenticated user
  """
  viewer: User! @scope(name: USERS_READ)
  """
  Look up a team's mass invitation by token
  """
  massInvitation(
    """
    The mass invitation token
    """
    token: ID!
  ): MassInvitationPayload! @scope(name: TEAMS_READ)
  """
  Search for GIFs using Giphy
  """
  searchGifs(
    """
    The search query to send to the service
    """
    query: String!
    """
    The ISO 3166-1 country of the user, default is US
    """
    country: String
    """
    The ISO 639-1 locale of the user, default is en_US
    """
    locale: String
    """
    The first n records to return
    """
    first: Int!
    """
    The pagination cursor, if any
    """
    after: String
  ): GifResponseConnection!
  """
  Verify a team invitation token and return details about the invitation
  """
  verifiedInvitation(
    """
    The invitation token
    """
    token: ID!
  ): VerifiedInvitationPayload! @scope(name: TEAMS_READ)
  """
  Generate an AI-suggested title for a reflection group in the demo
  """
  getDemoGroupTitle(
    """
    The text content of the reflections in the group
    """
    reflectionsContent: [String!]!
  ): GetDemoGroupTitlePayload!
  """
  Look up the SAML identity provider SSO URL for a given email domain
  """
  SAMLIdP(
    """
    the email associated with a SAML login. null if instance is SSO-only
    """
    email: ID

    """
    true if the user was invited, else false
    """
    isInvited: Boolean
  ): String

  """
  A root for public access to pages and other public objects which change access based on whether the viewer is logged in or not.
  """
  public: PublicRoot!
}
