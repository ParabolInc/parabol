"""
Success result for unlinkMattermostChannel mutation
"""
type UnlinkMattermostChannelSuccess {
  "The team whose Mattermost channel was unlinked"
  teamId: ID!
  "The remaining linked Mattermost channel IDs for the team"
  linkedChannels: [ID!]!
  """
  The id of the team notification settings that were removed
  """
  teamNotificationSettingsId: ID!
}
