"""
Result of disconnecting a user's Slack integration for a team
"""
type RemoveSlackAuthPayload {
  error: StandardMutationError

  """
  The ID of the authorization removed
  """
  authId: ID
  """
  The team the integration was removed from
  """
  teamId: ID

  """
  The user with updated slackAuth
  """
  user: User
}
