"""
An immutable snapshot of a TemplateScale, stored with completed meetings
"""
type TemplateScaleRef {
  "md5 hash of the scale values, used as a stable identifier"
  id: ID!
  createdAt: DateTime!

  """
  The title of the scale used in the template
  """
  name: String!

  """
  The values used in this scale
  """
  values: [TemplateScaleValue!]!
}
