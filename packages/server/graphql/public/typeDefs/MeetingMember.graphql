"""
All the user details for a specific meeting
"""
interface MeetingMember {
  """
  A composite of userId::meetingId
  """
  id: ID!

  """
  true if present, false if absent, else null
  """
  isCheckedIn: Boolean
    @deprecated(
      reason: "Members are checked in when they enter the meeting now & not created beforehand"
    )

  """
  The meeting this member participated in
  """
  meetingId: ID!

  """
  The type of meeting
  """
  meetingType: MeetingTypeEnum!

  """
  The team the meeting belongs to
  """
  teamId: ID!

  """
  The team member record for this user
  """
  teamMember: TeamMember!

  """
  The user who participated in the meeting
  """
  user: User!

  """
  The ID of the user who participated in the meeting
  """
  userId: ID!

  """
  The last time a meeting was updated (stage completed, finished, etc)
  """
  updatedAt: DateTime!
}
