"""
Input for broadcasting a drag position update during a retro grouping phase
"""
input UpdateDragLocationInput {
  "ID of the drag operation"
  id: ID!
  "Viewport height of the dragging client"
  clientHeight: Float!
  "Viewport width of the dragging client"
  clientWidth: Float!
  meetingId: ID!

  """
  The primary key of the item being dragged
  """
  sourceId: ID!

  """
  The estimated destination of the item being dragged
  """
  targetId: ID

  """
  The teamId to broadcast the message to
  """
  teamId: ID!

  """
  horizontal distance from the top left of the target
  """
  targetOffsetX: Float

  """
  vertical distance from the top left of the target
  """
  targetOffsetY: Float

  """
  the left of the source, relative to the client window
  """
  clientX: Float

  """
  the top of the source, relative to the client window
  """
  clientY: Float
}
