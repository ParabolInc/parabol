"""
Result of deleting a reflection during the reflect phase of a retrospective
"""
type RemoveReflectionPayload {
  error: StandardMutationError
  """
  The meeting the reflection was removed from
  """
  meeting: NewMeeting
  reflection: RetroReflection

  """
  The stages that were unlocked by navigating
  """
  unlockedStages: [NewMeetingStage!]
}
