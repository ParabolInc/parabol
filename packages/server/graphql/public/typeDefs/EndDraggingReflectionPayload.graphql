"""
The payload returned after a team member stops dragging a reflection card during a retrospective meeting.
Describes where the reflection landed, which groups were affected, and who performed the drag.
"""
type EndDraggingReflectionPayload {
  error: StandardMutationError

  """
  The unique identifier for this drag interaction, used to correlate start and end drag events
  """
  dragId: ID

  """
  The drag as sent from the team member
  """
  remoteDrag: RemoteReflectionDrag

  """
  the type of item the reflection was dropped on
  """
  dropTargetType: DragReflectionDropTargetTypeEnum

  """
  The ID that the dragged item was dropped on, if dropTargetType is not specific enough
  """
  dropTargetId: ID

  """
  The retrospective meeting in which the drag occurred
  """
  meeting: RetrospectiveMeeting

  """
  The ID of the retrospective meeting in which the drag occurred
  """
  meetingId: ID

  """
  The reflection card that was dragged and dropped
  """
  reflection: RetroReflection

  """
  The ID of the reflection group the reflection now belongs to after being dropped
  """
  reflectionGroupId: ID

  """
  The ID of the reflection card that was dragged
  """
  reflectionId: ID

  """
  foreign key to get user
  """
  userId: ID

  """
  The group encapsulating the new reflection. A new one was created if one was not provided.
  """
  reflectionGroup: RetroReflectionGroup

  """
  The old group the reflection was in
  """
  oldReflectionGroup: RetroReflectionGroup
}
