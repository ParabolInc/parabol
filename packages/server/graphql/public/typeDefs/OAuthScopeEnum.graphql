"""
An OAuth 2.0 scope. Serialized as resource:action in the database (e.g. MEETINGS_READ -> meetings:read).
"""
enum OAuthScopeEnum {
  MEETINGS_READ
  MEETINGS_WRITE
  TEAMS_READ
  TEAMS_WRITE
  TASKS_READ
  TASKS_WRITE
  USERS_READ
  USERS_WRITE
  ORG_READ
  ORG_WRITE
  TEMPLATES_READ
  TEMPLATES_WRITE
  PAGES_READ
  PAGES_WRITE
  COMMENTS_READ
  COMMENTS_WRITE
}
