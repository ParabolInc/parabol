"""
A project fetched from Jira in real time
"""
type JiraRemoteProject implements RepoIntegration {
  """
  Composite key: cloudId:projectKey
  """
  id: ID!

  """
  Always jira for this type
  """
  service: IntegrationProviderServiceEnum!

  """
  The parabol teamId this issue was fetched for
  """
  teamId: ID!

  """
  The parabol userId this issue was fetched for
  """
  userId: ID!
  """
  The REST API URL for this project resource
  """
  self: ID!

  """
  The cloud ID that the project lives on. Does not exist on the Jira object!
  """
  cloudId: ID!

  """
  The project key prefix used in issue keys (e.g. "PROJ" in "PROJ-123")
  """
  key: String!

  """
  The human-readable project name
  """
  name: String!

  """
  URL of the project avatar image
  """
  avatar: String

  avatarUrls: JiraRemoteAvatarUrls!
  projectCategory: JiraRemoteProjectCategory!

  """
  true if the project uses a simplified board configuration
  """
  simplified: Boolean!

  """
  The project style: classic or next-gen
  """
  style: String!
}
