"""
A stage within a Sprint Poker meeting where the team estimates and discusses a single task (Parabol Task or linked integration issue). Each stage is tied to one dimension (e.g. Story Points) and one task, and progresses from active voting to revealed scores to a facilitator-chosen final score.
"""
type EstimateStage implements NewMeetingStage & DiscussionThreadStage {
  """
  The unique stage ID (shortid)
  """
  id: ID!

  """
  The datetime the stage was completed (facilitator clicked 'Done'), null while still in progress
  """
  endAt: DateTime

  """
  Foreign key for the Sprint Poker meeting this stage belongs to. Prefer the meeting field for full details.
  """
  meetingId: ID!

  """
  The Sprint Poker meeting this stage belongs to
  """
  meeting: NewMeeting!

  """
  True if the facilitator has marked this stage complete (equivalent to endAt being set)
  """
  isComplete: Boolean!

  """
  True if any meeting participant is allowed to navigate directly to this stage
  """
  isNavigable: Boolean!

  """
  True if the facilitator is allowed to navigate directly to this stage
  """
  isNavigableByFacilitator: Boolean!

  """
  The phase this stage belongs to (e.g. the ESTIMATE phase of a Sprint Poker meeting)
  """
  phase: NewMeetingPhase

  """
  The type identifier of the phase this stage belongs to
  """
  phaseType: NewMeetingPhaseTypeEnum

  """
  The datetime the facilitator first entered this stage
  """
  startAt: DateTime

  """
  The number of times the facilitator has visited this stage during the meeting
  """
  viewCount: Int

  """
  True if a time limit is active and the stage is running asynchronously, false if a fixed end time is set, null if no time constraint is set
  """
  isAsync: Boolean

  """
  True if the current viewer has clicked Ready to advance to the next stage
  """
  isViewerReady: Boolean!

  """
  IDs of all team members who have clicked Ready to advance to the next stage
  """
  readyUserIds: [ID!]!

  """
  The datetime when this stage's time limit expires. Null if no time limit or end time has been set.
  """
  scheduledEndTime: DateTime

  """
  A system-suggested async deadline based on historical meeting data for this team. Null if insufficient data.
  """
  suggestedEndTime: DateTime

  """
  A system-suggested synchronous time limit (in minutes) based on historical meeting data for this team. Null if insufficient data.
  """
  suggestedTimeLimit: Float

  """
  The ID of the team running the Sprint Poker meeting that contains this stage
  """
  teamId: ID!

  """
  Milliseconds remaining until scheduledEndTime, calculated server-side to compensate for unsynchronized client clocks. Null if scheduledEndTime is null.
  """
  timeRemaining: Float

  """
  Foreign key linking to the Discussion thread associated with this stage
  """
  discussionId: ID!

  """
  The threaded discussion attached to this estimation stage, used for comments and reactions during estimation
  """
  discussion: Discussion!

  """
  The ID of the user who added this stage to the meeting (typically the facilitator or the user who added the task to the meeting)
  """
  creatorUserId: ID!

  """
  The ID of the Parabol Task being estimated in this stage
  """
  taskId: ID!

  """
  The field on the external service (e.g. Jira story points field) that this dimension maps to, used to push the final score back to the integration
  """
  serviceField: ServiceField!

  """
  The zero-based index of the TemplateDimensionRef used for this stage. Immutable after stage creation.
  """
  dimensionRefIdx: Int!

  """
  A frozen snapshot of the template dimension (e.g. Story Points) used for this stage. Immutable so historical meetings are unaffected by template edits.
  """
  dimensionRef: TemplateDimensionRef!

  """
  The final score chosen by the facilitator after voting is revealed. Null until the facilitator selects a value.
  """
  finalScore: String

  """
  IDs of team members whose cursors are currently hovering over the card deck (used for live presence indicators)
  """
  hoveringUserIds: [ID!]!

  """
  User objects for team members whose cursors are currently hovering over the card deck
  """
  hoveringUsers: [User!]!

  """
  All vote scores submitted for this stage, one entry per user who voted
  """
  scores: [EstimateUserScore!]!

  """
  The Parabol Task being estimated. Null if the task has been deleted since the stage was created.
  """
  task: Task

  """
  True while participants are actively voting and individual scores are hidden. False after the facilitator reveals all votes.
  """
  isVoting: Boolean!
}
