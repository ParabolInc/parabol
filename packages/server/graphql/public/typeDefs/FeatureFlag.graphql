"""
A server-side feature flag used to enable or disable functionality for specific users, teams, or organizations
"""
type FeatureFlag {
  """
  The ID of the feature flag
  """
  id: ID!

  """
  The name of the feature flag
  """
  featureName: String!

  """
  Description of the feature flag
  """
  description: String

  """
  Expiration date of the feature flag
  """
  expiresAt: DateTime!

  """
  The scope at which this flag applies: User, Team, or Organization
  """
  scope: FeatureFlagScope!
}
