"""
The payload returned after a user dismisses a suggested action, removing it from their list of suggested next steps.
"""
type DismissSuggestedActionPayload {
  """
  Present if an error occurred during the mutation; null on success.
  """
  error: StandardMutationError

  """
  The user that dismissed the action
  """
  user: User

  """
  The id of the removed suggested action
  """
  removedSuggestedActionId: ID
}
