"""
A saved prompt submitted to an LLM (e.g. OpenAI) by a user. Stores the content sent and metadata about usage. Use to retrieve or display a user's AI prompt history.
"""
type AIPrompt {
  """
  The unique ID of this AI prompt record
  """
  id: ID!
  """
  The ID of the user who created this prompt
  """
  userId: ID!
  """
  the AI-generated title of the content
  """
  title: String!
  """
  Plaintext of the content sent to the LLM. Does not include a preamble that includes formatting rules or type of data to expect
  """
  content: String!
  createdAt: DateTime!
  """
  The time the prompt was last used
  """
  lastUsedAt: DateTime!
  """
  true if the prompt is owned by the user
  """
  isUserDefined: Boolean!
}
