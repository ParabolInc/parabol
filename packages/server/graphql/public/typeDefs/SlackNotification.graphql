"""
A mapping of a Slack notification event to the channel it should be posted in
"""
type SlackNotification {
  id: ID!
  "The event that triggers this notification"
  event: SlackNotificationEventEnum!
  "Whether this notification targets the whole team or an individual member"
  eventType: SlackNotificationEventTypeEnum!

  """
  null if no notification is to be sent
  """
  channelId: ID
  teamId: ID!
  userId: ID!
}
