"""
Return value for acceptTeamInvitation mutation. On success, contains a new auth token and the team the user joined. On failure, contains a StandardMutationError.
"""
type AcceptTeamInvitationPayload {
  error: StandardMutationError

  """
  A new JWT auth token issued after joining the team; the client should replace its current token with this one
  """
  authToken: ID

  """
  The ID of an in-progress meeting to redirect the user to after joining
  """
  meetingId: ID

  """
  The in-progress meeting the user should be redirected to, if any
  """
  meeting: NewMeeting

  """
  The team that the invitee joined
  """
  team: Team

  """
  The new TeamMember record created for the user on the team
  """
  teamMember: TeamMember

  """
  Any pending team-invitation notifications for the joining user that can now be dismissed
  """
  notifications: [NotificationTeamInvitation!]

  """
  The team lead user, updated with new suggested actions after a member joins
  """
  teamLead: User
}
