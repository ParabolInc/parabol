"""
Input for creating a new team within an organization
"""
input NewTeamInput {
  """
  The name of the team
  """
  name: String!

  """
  The ID of the organization that the team belongs to
  """
  orgId: ID!
  """
  Whether the team is public (can be found and joined) or private (invite-only)
  """
  isPublic: Boolean!
}
