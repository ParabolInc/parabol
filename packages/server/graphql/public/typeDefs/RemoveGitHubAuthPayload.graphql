"""
Result of disconnecting a user's GitHub integration for a team
"""
type RemoveGitHubAuthPayload {
  error: StandardMutationError
  """
  The team the integration was removed from
  """
  teamId: ID

  """
  The team member with the updated auth
  """
  teamMember: TeamMember

  """
  The user with updated githubAuth
  """
  user: User
}
