"""
An AI-generated draft, grounded in a user's recent work items, that answers the
meeting prompt. The text is editable and can be moved into a meeting response.
"""
type InspirationItem {
  """
  A unique id for the item
  """
  id: ID!

  """
  The editable AI-generated text (plaintext/markdown)
  """
  content: String!

  """
  An optional short heading for the item
  """
  title: String

  """
  The integration service the source work items came from, e.g. github
  """
  service: String!

  """
  For retrospective meetings, the id of the ReflectPrompt (column) the item should be added to.
  Null for team prompt meetings, which have no reflect prompts.
  """
  promptId: ID

  """
  The time the item was generated
  """
  createdAt: DateTime!
}
