"""
A team member's Slack OAuth integration, used to post notifications to Slack
"""
type SlackIntegration {
  "Unique identifier"
  id: ID!

  """
  true if the auth is updated & ready to use for all features, else false
  """
  isActive: Boolean!

  "Parabol's Slack bot user ID"
  botUserId: ID

  "Parabol's Slack bot access token, used as the primary communication channel"
  botAccessToken: ID

  """
  The timestamp the provider was created
  """
  createdAt: DateTime!

  """
  The default channel to assign to new team notifications
  """
  defaultTeamChannelId: String!

  "The Slack workspace ID"
  slackTeamId: ID

  "The Slack workspace name"
  slackTeamName: String

  "The user's ID within Slack"
  slackUserId: ID!

  "The user's display name in Slack"
  slackUserName: String!

  "The Parabol team this integration is linked to"
  teamId: ID!

  """
  The timestamp the token was updated at
  """
  updatedAt: DateTime!

  "The Parabol user who connected this Slack integration"
  userId: ID!

  """
  A list of events and the slack channels they get posted to
  """
  notifications: [SlackNotification!]!
}
