"""
Result of verifying a team invitation token
"""
type VerifiedInvitationPayload {
  "Null if the invitation is valid; otherwise the reason it failed"
  errorType: TeamInvitationErrorEnum

  """
  The name of the person that sent the invitation, present if errorType is expired
  """
  inviterName: String

  """
  The email of the person that sent the invitation, present if errorType is expired
  """
  inviterEmail: String

  """
  true if the mx record is hosted by google, else falsy
  """
  isGoogle: Boolean

  """
  A string to redirect to the SSO IdP, else null
  """
  ssoURL: String

  """
  The valid invitation, if any
  """
  teamInvitation: TeamInvitation

  """
  Name of the inviting team, present if invitation exists
  """
  teamName: String
  "ID of the meeting the invite is linked to, if any"
  meetingId: ID
  "Name of the meeting the invite is linked to, if any"
  meetingName: String
  "Type of the meeting the invite is linked to, if any"
  meetingType: MeetingTypeEnum

  """
  The userId of the invitee, if already a parabol user
  """
  userId: ID

  """
  The invitee, if already a parabol user, present if errorType is null
  """
  user: User
}
