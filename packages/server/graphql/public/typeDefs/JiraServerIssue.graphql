"""
The Jira Issue that comes direct from Jira Data Center
"""
type JiraServerIssue implements TaskIntegration {
  """
  GUID providerId:repositoryId:issueId
  """
  id: ID!
  """
  The issue key as shown in Jira (e.g. "PROJ-123")
  """
  issueKey: ID!

  """
  The issue type identifier
  """
  issueType: ID!

  """
  The ID of the Jira project this issue belongs to
  """
  projectId: ID!

  """
  The key of the Jira project (e.g. "PROJ")
  """
  projectKey: ID!

  """
  The human-readable project name
  """
  projectName: String!

  """
  The parabol teamId this issue was fetched for
  """
  teamId: ID!

  """
  The parabol userId this issue was fetched for
  """
  userId: ID!

  """
  The url to access the issue
  """
  url: String!

  """
  The plaintext summary of the jira issue
  """
  summary: String!

  """
  The stringified ADF description of the Jira issue
  """
  description: String!

  """
  The description converted into raw HTML
  """
  descriptionHTML: String!
  """
  Names of fields on this issue that can be used for story point estimation
  """
  possibleEstimationFieldNames: [String!]!

  """
  The timestamp the issue was last updated
  """
  updatedAt: DateTime!
}
