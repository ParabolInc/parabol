"""
An immutable snapshot of a TemplateDimension, stored with completed meetings
"""
type TemplateDimensionRef {
  id: ID!

  """
  the order of the dimensions in the template
  """
  sortOrder: Float!

  """
  The name of the dimension
  """
  name: String!

  "The md5 hash identifying the immutable scale ref used in this dimension"
  scaleRefId: ID!

  """
  scale used in this dimension
  """
  scale: TemplateScaleRef!
}
