"""
Shared secret provider metadata
"""
input IntegrationProviderMetadataInputSharedSecret {
  """
  The base URL used to access the provider
  """
  serverBaseUrl: URL!

  """
  Shared secret between Parabol and the provider.
  Optional — omit when the provider handles its own request signing (e.g. the Mattermost plugin,
  which uses per-channel Bearer tokens and never shares its signing key with Parabol).
  """
  sharedSecret: String
}
