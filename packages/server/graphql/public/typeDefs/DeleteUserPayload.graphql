"""
Returned by the deleteUser mutation. Represents the outcome of a request to
permanently soft-delete a user account. A successful deletion removes the user
from all teams and organizations, blacklists their JWT, clears their auth
cookie (when a user deletes their own account), and broadcasts a mention update
to replace any in-progress references to that user. On success all fields are
null. On failure only error is populated.
"""
type DeleteUserPayload {
  """
  Populated when the mutation fails. Common failure reasons: supplying both
  userId and email (mutually exclusive), supplying neither, attempting to
  delete a different user without super-user privileges, or calling the
  mutation outside the re-authentication window required for self-deletion.
  Null on success.
  """
  error: StandardMutationError
}
