"""
Return value for updateTask mutation
"""
type UpdateTaskPayload {
  error: StandardMutationError
  "The updated task"
  task: Task

  """
  If a task was just turned private, its ID, else null
  """
  privatizedTaskId: ID
  "Notification created if a user was newly involved in the task"
  addedNotification: NotifyTaskInvolves
}
