"""
A suggestion to invite others to an existing team
"""
type SuggestedActionInviteYourTeam implements SuggestedAction {
  "Unique identifier"
  id: ID!

  "When the suggested action was created"
  createdAt: DateTime!

  """
  The priority of the suggested action compared to other suggested actions (smaller number is higher priority)
  """
  priority: Float

  "When the suggested action was dismissed or completed, if applicable"
  removedAt: DateTime

  """
  The specific type of suggested action
  """
  type: SuggestedActionTypeEnum!

  "The user this action is suggested for"
  userId: ID!

  "The user who can see this suggestion"
  user: User!

  """
  The teamId that we suggest you should invite people to
  """
  teamId: ID!

  """
  The team you should invite people to
  """
  team: Team!
}
