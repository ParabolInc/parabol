"""
A computed pointer back to the retrospective discussion where a task was created.
Present only when the task originated in a retrospective meeting and is linked to a
specific reflection group discussion. Used by the client to render an inline link
on the task card that deep-links to the discussion stage in the retro.
"""
type TaskRetroDiscussion {
  """
  The retrospective meeting's display name, e.g. "Retro #42".
  """
  meetingName: String!

  """
  The reflection group's title, e.g. "Tools and Processes". Falls back to a generic
  label when the group hasn't been titled yet.
  """
  topicTitle: String!

  """
  Relative URL that opens the retro at the matching discuss stage, e.g.
  "/meet/<meetingId>/discuss/3".
  """
  url: String!
}
