"""
Return value for the archiveTeam mutation. When a team is archived (or deleted if unused),
this payload delivers the updated team record, a notification sent to all former members,
the IDs of any homepage suggested-action cards that were removed, and the IDs of meeting
templates owned by the team so clients can remove them from local caches.
"""
type ArchiveTeamPayload {
  error: StandardMutationError

  """
  The team that was archived (or deleted). Inspect team.isArchived to distinguish the two cases.
  Null when the operation fails.
  """
  team: Team

  """
  A notification explaining that the team was archived and removed from view
  """
  notification: NotifyTeamArchived

  """
  IDs of suggested-action cards (e.g. "Invite your team", "Try a retro") that were shown on the
  user's homepage and are now removed because they referenced this team. Clients should evict
  these records from their caches.
  """
  removedSuggestedActionIds: [ID]

  """
  A list of the ids of templates created by a team
  """
  teamTemplateIds: [ID!]!
}
