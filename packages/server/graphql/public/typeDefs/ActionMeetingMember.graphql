"""
Represents a team member's participation record in a Check-In (Action) meeting. Tracks which tasks were completed or assigned during the meeting for that member.
"""
type ActionMeetingMember implements MeetingMember {
  """
  A composite of userId::meetingId
  """
  id: ID!

  """
  true if present, false if absent, else null
  """
  isCheckedIn: Boolean
    @deprecated(
      reason: "Members are checked in when they enter the meeting now & not created beforehand"
    )
  """
  The ID of the meeting this member record belongs to
  """
  meetingId: ID!
  """
  Always ACTION for this meeting type
  """
  meetingType: MeetingTypeEnum!
  """
  The ID of the team this meeting belongs to
  """
  teamId: ID!
  """
  The team member associated with this participation record
  """
  teamMember: TeamMember!
  """
  The user associated with this participation record
  """
  user: User!
  """
  The ID of the user associated with this participation record
  """
  userId: ID!

  """
  The last time a meeting was updated (stage completed, finished, etc)
  """
  updatedAt: DateTime!

  """
  The tasks marked as done in the meeting
  """
  doneTasks: [Task!]!

  """
  The tasks assigned to members during the meeting
  """
  tasks: [Task!]!
}
