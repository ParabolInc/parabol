"""
A notification sent to a user to inform them of an event that requires their attention
"""
interface Notification {
  """
  The unique notification ID
  """
  id: ID!

  """
  UNREAD if new, READ if viewer has seen it, CLICKED if viewed clicked it
  """
  status: NotificationStatusEnum!

  """
  The datetime to activate the notification & send it to the client
  """
  createdAt: DateTime!

  """
  The notification type, used to determine which concrete type to resolve
  """
  type: NotificationEnum!

  """
  The ID of the user who should see this notification
  """
  userId: ID!
}
