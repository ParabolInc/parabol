input AddCommentInput {
  """
  A stringified TipTap JSONContent  document containing thoughts
  """
  content: String!

  """
  true if the comment should be anonymous
  """
  isAnonymous: Boolean

  """
  foreign key for the discussion this was created in
  """
  discussionId: ID!
  """
  The sort order of this comment within its thread (used to order replies)
  """
  threadSortOrder: Int!
  """
  The ID of the parent comment if this is a reply; omit for top-level comments
  """
  threadParentId: ID
}
