"""
Result of transferring the facilitator role to a new team member during a meeting
"""
type PromoteNewMeetingFacilitatorPayload {
  error: StandardMutationError

  """
  The meeting in progress
  """
  meeting: NewMeeting
  """
  The stage the new facilitator is now on
  """
  facilitatorStage: NewMeetingStage

  """
  The old meeting facilitator
  """
  oldFacilitator: User
}
