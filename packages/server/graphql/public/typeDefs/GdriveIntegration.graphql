"""
Google Drive integration info for a team member, used for Meet transcript imports
"""
type GdriveIntegration {
  """
  The OAuth2 access token for this integration, if connected
  """
  auth: TeamMemberIntegrationAuthOAuth2

  """
  The global provider configuration for gdrive OAuth
  """
  cloudProvider: IntegrationProviderOAuth2

  """
  True if the user has an active gdrive integration for this team
  """
  isActive: Boolean!

  """
  The time the Google Drive watch channel expires, if one is active
  """
  watchExpiresAt: DateTime
}
