"""
Successful result of addIntegrationProvider. The integration provider has been registered and is now available for use by teams or org members.
"""
type AddIntegrationProviderSuccess {
  """
  The newly registered integration provider
  """
  provider: IntegrationProvider!

  """
  The updated set of organization-level integration providers, if the new provider affects org scope
  """
  orgIntegrationProviders: OrgIntegrationProviders

  """
  Updated team member integrations, if the new provider affects team scope
  """
  teamMemberIntegrations: TeamMemberIntegrations
}
