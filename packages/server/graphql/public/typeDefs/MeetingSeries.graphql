"""
A meeting series representing a set of recurring meetings
"""
type MeetingSeries {
  """
  The unique meeting series ID
  """
  id: ID!

  """
  The team that owns the meeting series
  """
  teamId: ID!

  """
  The type of the recurring meeting
  """
  meetingType: MeetingTypeEnum!

  """
  The name of the meeting series used to generate the names of the recurring meetings
  """
  title: String!

  """
  The RFC-2445 recurrence rule that determines when meetings should start
  """
  recurrenceRule: String!

  """
  The duration, in minutes, of meetings that recur
  """
  duration: Int!

  """
  When the meeting series was created
  """
  createdAt: DateTime!

  """
  When the meeting series was last updated
  """
  updatedAt: DateTime!

  """
  When the meeting series was cancelled
  """
  cancelledAt: DateTime

  """
  The meetings that belong to the meeting series
  """
  activeMeetings: [NewMeeting!]!

  """
  The most recent meeting in the series. Any active meeting takes precendence over inactive
  meetings. Null when the series has been scheduled for the future and no meeting has
  spawned from the recurrence cron yet.
  """
  mostRecentMeeting: NewMeeting

  """
  The next scheduled occurrence of the recurrence rule, computed server-side from
  recurrenceRule. Null if the series is cancelled or has no future occurrences.
  """
  nextMeetingDate: DateTime

  """
  URL-safe slug identifying the series in invitee-facing links (e.g., gcal descriptions).
  Format: <kebab-title>-<cipher>, mirroring the Pages convention. The trailing cipher hides
  the DB id; the leading title slug is decorative. Use with the /meeting-series/:slug route,
  which redirects an invitee into any active meeting for the series or back to /meetings.
  """
  urlSlug: String!
}
