"""
organization-specific details about a user
"""
type OrganizationUser {
  """
  Composite key: orgId::userId
  """
  id: ID!

  """
  the datetime the user first joined the org
  """
  joinedAt: DateTime!

  """
  The organization this record belongs to
  """
  orgId: ID!

  """
  The user attached to the organization
  """
  organization: Organization!

  """
  if not a member, the datetime the user was removed from the org
  """
  removedAt: DateTime

  """
  role of the user in the org
  """
  role: OrgUserRole

  """
  The user this record belongs to
  """
  userId: ID!

  """
  The user attached to the organization
  """
  user: User!

  """
  The suggested tier upgrade for this user based on usage
  """
  suggestedTier: TierEnum

  """
  The effective tier for this user within the organization
  """
  tier: TierEnum

  """
  The tier used for billing this user
  """
  billingTier: TierEnum
}
