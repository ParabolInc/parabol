"""
A single team member's vote on a Poker planning stage. Each stage corresponds to one
estimation dimension, so this record captures which label (e.g. "5", "XL") a specific
user chose when voting on that dimension. One score exists per (stage, user) pair.
"""
type EstimateUserScore {
  """
  A composite identifier derived from the stageId and userId, uniquely identifying this
  vote within the meeting.
  """
  id: ID!

  """
  The ID of the EstimateStage (i.e. the specific dimension being estimated) that this
  score belongs to.
  """
  stageId: ID!

  """
  The ID of the team member who cast this vote.
  """
  userId: ID!

  """
  The team member who cast this vote.
  """
  user: User!

  """
  The scale label selected by the user at the time of voting (e.g. "3", "8", "?").
  Stored as a snapshot because scale values are mutable — the label may no longer exist
  on the dimension's template scale after the vote was cast.
  """
  label: String!
}
