<!doctype html>
<html lang="en">
  <head>
    <script>
      window.__ACTION__ = <%= htmlWebpackPlugin.options.__ACTION__ %>
    </script>
    <title>Streamline or Replace Meetings | Parabol</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#493272" />
    <!-- Dark mode boot: apply .theme-dark before first paint. 'theme' mirrors LocalStorageKey.THEME.
         Absent or 'system' follows the OS, matching DEFAULT_THEME_PREFERENCE in themePreference.ts. -->
    <script>
      try {
        var themePref = localStorage.getItem('theme')
        if (
          themePref === 'dark' ||
          (themePref !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
          document.documentElement.className += ' theme-dark'
          var themeMeta = document.querySelector('meta[name="theme-color"]')
          if (themeMeta) themeMeta.setAttribute('content', '#2d1d53')
        }
      } catch (e) {}
    </script>
    <meta
      name="description"
      content="Meetings are expensive. Parabol makes meeting time as efficient as possible or even replaces meetings with a structured collaborative process that can be done on your own time. Try our team stand-ups, check-ins, retrospectives, Sprint Poker, prioritization templates and more, free."
    />
    <link href="/static/manifest.json" rel="manifest" />
    <link href="/static/favicon.ico" rel="shortcut icon" />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
