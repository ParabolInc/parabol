name: Ironbank Image Upload

on: workflow_dispatch

jobs:
  pull-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: Verify if running from a Tag
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          echo "This workflow is intended to run only from a Git Tag (e.g., v1.0.0)."
          echo "Current reference is: ${{ github.ref }}"
          # Force fail the job
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4

      - id: "auth"
        name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v2"
        with:
          token_format: "access_token"
          workload_identity_provider: ${{ secrets.GCP_WI_PROVIDER_NAME }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: "docker/login-action@v3"
        with:
          registry: ${{ secrets.GCP_DOCKER_REGISTRY }}
          username: "oauth2accesstoken"
          password: "${{ steps.auth.outputs.access_token }}"

      - name: Pull Docker image from GCP
        run: docker pull ${{ secrets.GCP_AR_PARABOL }}:${{ github.ref_name }}

      - name: Create temporary container
        run: |
          docker create --name temp-container ${{ secrets.GCP_AR_PARABOL }}:${{ github.ref_name }}

      - name: Copy files from container
        run: |
          docker cp temp-container:/home/node/parabol/dist ./dist
          docker cp temp-container:/home/node/parabol/build ./build
          docker cp temp-container:/home/node/parabol/pnpm-lock.yaml ./pnpm-lock.yaml
          docker cp temp-container:/home/node/tools/ip-to-server_id ./ip-to-server_id

      - name: Zip the files
        run: zip -r ${{ github.ref_name }}.zip dist build pnpm-lock.yaml ip-to-server_id

      - name: Upload to GCS
        env:
          CLOUDSDK_AUTH_ACCESS_TOKEN: "${{ steps.auth.outputs.access_token }}"
        run: |
          DEST="gs://parabol-ironbank-resources/${{ github.ref_name }}.zip"
          if gcloud storage ls "$DEST" > /dev/null 2>&1; then
            echo "File already exists at $DEST, skipping upload."
          else
            gcloud storage cp "${{ github.ref_name }}.zip" "$DEST"
          fi

      - name: USEFUL INFORMATION
        id: useful-info
        run: |
          node_version=$(jq -r -j '.engines.node|ltrimstr("^")' package.json)
          release_filename="${{ github.ref_name }}.zip"
          sha256=$(sha256sum "$release_filename" | awk '{ print $1 }')
          echo "Parabol version: ${{ github.ref_name }}"
          echo "File location: https://storage.googleapis.com/parabol-ironbank-resources/$release_filename"
          echo "SHA-256: $sha256"
          echo "NodeJS version: $node_version"
          echo "sha256=$sha256" >> $GITHUB_OUTPUT

      - name: Create Ironbank PR
        env:
          REPO1_TOKEN: ${{ secrets.REPO1_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          SHA256: ${{ steps.useful-info.outputs.sha256 }}
        run: |
          VERSION="${REF_NAME#v}"
          BRANCH="feat/${REF_NAME}"

          git clone --branch master "https://oauth2:${REPO1_TOKEN}@repo1.dso.mil/dsop/parabol/parabol.git" ironbank-repo
          cd ironbank-repo

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          git checkout -b "${BRANCH}"

          # Update Dockerfile line 16
          sed -i "16s|.*|COPY ${REF_NAME}.zip /home/node/app.zip|" Dockerfile

          # Update hardening_manifest.yaml
          sed -i "11s|.*|- \"${VERSION}\"|" hardening_manifest.yaml
          sed -i "36s|.*|  org.opencontainers.image.version: \"${VERSION}\"|" hardening_manifest.yaml
          sed -i "46s|.*|  - url: \"https://storage.googleapis.com/parabol-ironbank-resources/${REF_NAME}.zip\"|" hardening_manifest.yaml
          sed -i "47s|.*|    filename: \"${REF_NAME}.zip\"|" hardening_manifest.yaml
          sed -i "50s|.*|      value: \"${SHA256}\"|" hardening_manifest.yaml

          git add Dockerfile hardening_manifest.yaml
          git commit -m "chore: update Ironbank release to ${REF_NAME}"
          git push "https://oauth2:${REPO1_TOKEN}@repo1.dso.mil/dsop/parabol/parabol.git" "${BRANCH}"

          # Create merge request via GitLab API
          curl --silent --fail --request POST \
            --header "PRIVATE-TOKEN: ${REPO1_TOKEN}" \
            --header "Content-Type: application/json" \
            "https://repo1.dso.mil/api/v4/projects/dsop%2Fparabol%2Fparabol/merge_requests" \
            --data "{
              \"source_branch\": \"${BRANCH}\",
              \"target_branch\": \"master\",
              \"title\": \"chore: update Ironbank release to ${REF_NAME}\"
            }"

      - name: Report Status
        if: failure()
        uses: ravsamhq/notify-slack-action@v2
        with:
          status: ${{ job.status }}
          notify_when: "failure"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_GH_ACTIONS_NOTIFICATIONS }}
