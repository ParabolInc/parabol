name: Docker publish externally

on: workflow_dispatch

jobs:
  pull-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: Verify if running from a Tag
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          echo "This workflow is intended to run only from a Git Tag (e.g., v1.0.0)."
          echo "Current reference is: ${{ github.ref }}"
          # Force fail the job
          exit 1

      - id: "auth"
        name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v2"
        with:
          token_format: "access_token"
          workload_identity_provider: ${{ secrets.GCP_WI_PROVIDER_NAME }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Push Docker image to the external repository
        run: |-
          gcloud container images add-tag -q \
          ${{ secrets.GCP_AR_PARABOL }}:${{ github.ref_name }}  \
          ${{ secrets.GCP_AR_PARABOL_EXTERNAL }}:${{ github.ref_name }}

      - name: Open GitLab MRs
        env:
          GITLAB_DEPLOYMENT_ACCESS_TOKEN: ${{ secrets.GITLAB_DEPLOYMENT_ACCESS_TOKEN }}
          PPMI_REPO_NAMES: ${{ secrets.PPMI_REPO_NAMES }}
        run: |
          set -euo pipefail
          VERSION_NUMBER="${GITHUB_REF_NAME#v}"
          BRANCH_NAME="feat/v${VERSION_NUMBER}"
          COMMIT_MESSAGE="Upgrade to v${VERSION_NUMBER}"

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions"

          while IFS= read -r REPO_NAME; do
            echo "Processing: ${REPO_NAME}"

            PROJECT_PATH="parabol1/ppmi/${REPO_NAME}"
            AUTH_URL="https://oauth2:${GITLAB_DEPLOYMENT_ACCESS_TOKEN}@gitlab.com/${PROJECT_PATH}.git"
            API_BASE="https://gitlab.com/api/v4/projects/parabol1/ppmi/${REPO_NAME}"

            DEFAULT_BRANCH=$(curl -sf --header "PRIVATE-TOKEN: ${GITLAB_DEPLOYMENT_ACCESS_TOKEN}" "${API_BASE}" | jq -r '.default_branch')

            git clone --branch "${DEFAULT_BRANCH}" "${AUTH_URL}" repo
            cd repo

            git checkout -b "${BRANCH_NAME}"
            sed -i "4s|.*|applicationVersion: \&applicationVersion v${VERSION_NUMBER}|" parabol/version.yaml
            git add parabol/version.yaml
            git commit -m "${COMMIT_MESSAGE}"
            git push "${AUTH_URL}" "${BRANCH_NAME}"

            curl --silent --fail --request POST \
              --header "PRIVATE-TOKEN: ${GITLAB_DEPLOYMENT_ACCESS_TOKEN}" \
              --header "Content-Type: application/json" \
              "${API_BASE}/merge_requests" \
              --data "{\"source_branch\": \"${BRANCH_NAME}\", \"target_branch\": \"${DEFAULT_BRANCH}\", \"title\": \"${COMMIT_MESSAGE}\"}"

            echo "MR created for ${REPO_NAME}"
            cd ..
            rm -rf repo

          done < <(echo "$PPMI_REPO_URLS" | jq -r '.[]')

      - name: Report Status
        if: failure()
        uses: ravsamhq/notify-slack-action@v2
        with:
          status: ${{ job.status }}
          notify_when: "failure"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_GH_ACTIONS_NOTIFICATIONS }}
